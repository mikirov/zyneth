[build]
builder = "DOCKERFILE"
dockerfilePath = "./apis/vault-api/Dockerfile"
watchPatterns = [
    "apis/vault-api/**",
    "!/*.md",
    "bun.lock",
    "package.json",
]

[deploy]
numReplicas = 1
healthcheckPath = "/health"
sleepApplication = true
restartPolicyType = "ALWAYS"
restartPolicyMaxRetries = 10
region = "europe-west4"
