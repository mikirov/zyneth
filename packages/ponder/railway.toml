[build]
builder = "DOCKERFILE"
dockerfilePath = "./packages/ponder/Dockerfile"
watchPatterns = ["packages/ponder/**", "!/*.md", "bun.lock", "package.json"]

[deploy]
numReplicas = 1
healthcheckPath = "/ready"
healthcheckTimeout = 172800
restartPolicyType = "ALWAYS"
restartPolicyMaxRetries = 10
region = "europe-west4"
